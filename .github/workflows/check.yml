name: Check Nix Flake
on: [push]
jobs:
  check-linux:
    name: Run Flake checks (${{ matrix.system }})
    strategy:
      fail-fast: false # Don't cancel other matrix jobs if one fails
      matrix:
        include:
          - os: ubuntu-latest
            system: x86_64-linux
          # - os: ubuntu-24.04-arm
          #   system: aarch64-linux
          # - os: ubuntu-latest
          #   system: riscv64-linux
    runs-on: ${{ matrix.os }}
    steps: &nix_steps
      - name: Set up Git repository
        uses: actions/checkout@v6.0.2

      - name: Install Lix
        uses: canidae-solutions/lix-quick-install-action@v4.0.1
        with:
          github_access_token: ${{ secrets.ACCESS_TOKEN_GITHUB }}

      - name: Magic Nix Cache
        if: github.server_url == 'https://github.com'
        uses: DeterminateSystems/magic-nix-cache-action@v13

      - name: Proteus' Nix Cache
        if: github.server_url != 'https://github.com'
        run: |
          sed -i -e 's|^\(extra-substituters\ = \)|\1https://nix-cache.s3-pub.proteus.eu.org/ |' \
          -e 's|^\(extra-trusted-public-keys\ =\ \)|\1s3.proteus.eu.org-1:IxrRwk4uC5ittHeG9menkuajABnrX9cboEWwZz/m4+E= |' \
          /etc/nix/nix.conf

      - name: Run nix flake check
        run: |
          nix eval .#checks

  check-macos:
    name: Run Flake checks (aarch64-darwin)
    # Only run macOS checks on GitHub, skip them on Forgejo
    if: github.server_url == 'https://github.com'
    strategy:
      matrix:
        # Use a dynamic runs-on so Forgejo doesn't hang waiting for a macos runner before evaluating the `if` condition
        os: ${{ fromJSON(github.server_url == 'https://github.com' && '["macos-latest"]' || '["ubuntu-latest"]') }}
        system: [aarch64-darwin]
    runs-on: ${{ matrix.os }}
    steps: *nix_steps
